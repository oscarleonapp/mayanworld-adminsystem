<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión - Travel Mayan World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .offline-container {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            margin: 2rem;
        }
        .offline-icon {
            font-size: 4rem;
            color: #6c757d;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .offline-title {
            color: #343a40;
            font-weight: 700;
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        .offline-message {
            color: #6c757d;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .retry-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .connection-status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
            background: #f8f9fa;
            display: none;
        }
        .status-online {
            color: #28a745;
            background: #d4edda !important;
        }
        .status-offline {
            color: #dc3545;
            background: #f8d7da !important;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="bi bi-wifi-off"></i>
        </div>
        
        <h1 class="offline-title">Sin Conexión a Internet</h1>
        
        <p class="offline-message">
            No se puede conectar a internet en este momento. 
            Algunas funciones pueden no estar disponibles hasta que se restablezca la conexión.
        </p>

        <button class="btn retry-btn" onclick="checkConnection()">
            <i class="bi bi-arrow-clockwise me-2"></i>
            Reintentar Conexión
        </button>

        <div class="connection-status" id="connectionStatus">
            <i class="bi bi-circle-fill me-2"></i>
            <span id="statusText">Verificando conexión...</span>
        </div>

        <div class="mt-4">
            <small class="text-muted">
                <i class="bi bi-info-circle me-1"></i>
                Esta página funciona sin conexión gracias a la tecnología PWA
            </small>
        </div>
    </div>

    <script>
        let isOnline = navigator.onLine;
        
        function updateConnectionStatus(online) {
            const statusDiv = document.getElementById('connectionStatus');
            const statusText = document.getElementById('statusText');
            const icon = statusDiv.querySelector('i');
            
            statusDiv.style.display = 'block';
            
            if (online) {
                statusDiv.className = 'connection-status status-online';
                statusText.textContent = 'Conexión restaurada';
                icon.className = 'bi bi-check-circle-fill me-2';
                
                // Redirigir después de un momento
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                statusDiv.className = 'connection-status status-offline';
                statusText.textContent = 'Sin conexión a internet';
                icon.className = 'bi bi-x-circle-fill me-2';
            }
        }

        function checkConnection() {
            const statusDiv = document.getElementById('connectionStatus');
            const statusText = document.getElementById('statusText');
            
            statusDiv.style.display = 'block';
            statusDiv.className = 'connection-status';
            statusText.textContent = 'Verificando conexión...';
            
            // Simular verificación de conexión
            setTimeout(() => {
                updateConnectionStatus(navigator.onLine);
            }, 1000);
        }

        // Escuchar eventos de conexión
        window.addEventListener('online', () => {
            updateConnectionStatus(true);
        });

        window.addEventListener('offline', () => {
            updateConnectionStatus(false);
        });

        // Verificar conexión al cargar
        document.addEventListener('DOMContentLoaded', () => {
            if (navigator.onLine) {
                // Si hay conexión, redirigir automáticamente
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            }
        });
    </script>
</body>
</html>
