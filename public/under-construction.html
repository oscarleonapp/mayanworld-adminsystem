<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sitio en construcción — Travel Mayan World</title>
    <meta name="description" content="Estamos trabajando para ofrecerte una mejor experiencia." />
    <style>
      /* Under Construction styles (inline, no dependencies) */
      :root {
        --bg-start: #0e1b2b;
        --bg-end: #1b3a57;
        --card: #0f2236;
        --text: #e8f0f7;
        --muted: #a7c0d9;
        --accent: #23b8ff;
        --accent-2: #00d4a6;
        --shadow: 0 10px 30px rgba(0,0,0,.25);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        color: var(--text);
        background: radial-gradient(1200px 600px at 10% 10%, #14273f 0%, transparent 60%),
                    linear-gradient(160deg, var(--bg-start), var(--bg-end));
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      .uc-wrapper {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      .uc-card {
        width: min(720px, 100%);
        background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 2.25rem 2rem;
        text-align: center;
        backdrop-filter: blur(6px);
      }
      .uc-icon { margin-bottom: 1rem; }
      .uc-icon svg { color: var(--accent); display: block; margin: 0 auto; }
      .gear-large, .gear-small { 
        transform-box: fill-box; 
        transform-origin: center; 
        filter: drop-shadow(0 6px 10px rgba(35,184,255,.25)); 
      }
      .gear-large { animation: spinLarge 10s linear infinite; }
      .gear-small { animation: spinSmall 6s linear infinite reverse; color: var(--accent-2); }
      @keyframes spinLarge { to { transform: rotate(360deg); } }
      @keyframes spinSmall { to { transform: rotate(360deg); } }
      h1 { margin: 0.25rem 0 0.5rem; font-size: clamp(1.6rem, 2.5vw, 2.1rem); }
      .uc-lead { margin: 0 0 1rem; color: var(--muted); }
      .uc-status {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        padding: .5rem .75rem;
        border-radius: 999px;
        background: rgba(35,184,255,.08);
        border: 1px solid rgba(35,184,255,.25);
        margin: .5rem 0 1.25rem;
      }
      .badge {
        font-size: .75rem;
        color: #00131d;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        padding: .25rem .5rem;
        border-radius: 999px;
        font-weight: 700;
      }
      .dots span { display: inline-block; animation: blink 1.2s infinite; }
      .dots span:nth-child(2){ animation-delay: .2s; }
      .dots span:nth-child(3){ animation-delay: .4s; }
      @keyframes blink { 0%, 20% { opacity: 0 } 21%, 100% { opacity: 1 } }
      .uc-actions { display: flex; justify-content: center; gap: .75rem; margin: .25rem 0 1rem; flex-wrap: wrap; }
      .btn {
        --btn-bg: rgba(255,255,255,.06);
        --btn-br: rgba(255,255,255,.16);
        color: var(--text);
        background: var(--btn-bg);
        border: 1px solid var(--btn-br);
        padding: .65rem 1rem;
        border-radius: 10px;
        text-decoration: none;
        transition: transform .15s ease, background .2s ease, border-color .2s ease;
      }
      .btn:hover { transform: translateY(-1px); border-color: rgba(255,255,255,.35); }
      .btn:active { transform: translateY(0); }
      .btn.primary {
        --btn-bg: linear-gradient(90deg, rgba(35,184,255,.35), rgba(0,212,166,.35));
        --btn-br: rgba(35,184,255,.55);
      }
      .uc-meta { margin: .25rem 0 0; font-size: .9rem; color: var(--muted); }
      @media (max-width: 420px) { .uc-card { padding: 1.5rem 1.25rem; } }
    </style>
  </head>
  <body>
    <main class="uc-wrapper" role="main" aria-labelledby="uc-title">
      <section class="uc-card" aria-live="polite">
        <div class="uc-icon" aria-hidden="true">
          <!-- Two interlocking, smoothly animated gears -->
          <svg class="gears" width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trabajo en progreso">
            <title>Trabajo en progreso</title>
            <desc>Dos engranes girando para indicar que el sistema está en construcción</desc>
            <!-- Large gear -->
            <g class="gear-large" transform="translate(50,60)">
              <!-- body ring -->
              <circle r="22" fill="none" stroke="currentColor" stroke-width="8"/>
              <!-- hub -->
              <circle r="6" fill="currentColor"/>
              <!-- teeth -->
              <g fill="currentColor">
                <rect x="-2" y="-32" width="4" height="10" rx="1"/>
                <rect x="-2" y="22" width="4" height="10" rx="1"/>
                <rect x="22" y="-2" width="10" height="4" rx="1"/>
                <rect x="-32" y="-2" width="10" height="4" rx="1"/>
                <g transform="rotate(30)">
                  <rect x="-2" y="-32" width="4" height="10" rx="1"/>
                  <rect x="-2" y="22" width="4" height="10" rx="1"/>
                </g>
                <g transform="rotate(60)">
                  <rect x="-2" y="-32" width="4" height="10" rx="1"/>
                  <rect x="-2" y="22" width="4" height="10" rx="1"/>
                </g>
                <g transform="rotate(120)">
                  <rect x="-2" y="-32" width="4" height="10" rx="1"/>
                  <rect x="-2" y="22" width="4" height="10" rx="1"/>
                </g>
                <g transform="rotate(150)">
                  <rect x="-2" y="-32" width="4" height="10" rx="1"/>
                  <rect x="-2" y="22" width="4" height="10" rx="1"/>
                </g>
                <g transform="rotate(210)">
                  <rect x="-2" y="-32" width="4" height="10" rx="1"/>
                  <rect x="-2" y="22" width="4" height="10" rx="1"/>
                </g>
                <g transform="rotate(240)">
                  <rect x="-2" y="-32" width="4" height="10" rx="1"/>
                  <rect x="-2" y="22" width="4" height="10" rx="1"/>
                </g>
                <g transform="rotate(300)">
                  <rect x="-2" y="-32" width="4" height="10" rx="1"/>
                  <rect x="-2" y="22" width="4" height="10" rx="1"/>
                </g>
              </g>
            </g>
            <!-- Small gear -->
            <g class="gear-small" transform="translate(84,84)">
              <circle r="14" fill="none" stroke="currentColor" stroke-width="6"/>
              <circle r="4" fill="currentColor"/>
              <g fill="currentColor">
                <rect x="-1.5" y="-22" width="3" height="7" rx="1"/>
                <rect x="-1.5" y="15" width="3" height="7" rx="1"/>
                <rect x="15" y="-1.5" width="7" height="3" rx="1"/>
                <rect x="-22" y="-1.5" width="7" height="3" rx="1"/>
                <g transform="rotate(30)">
                  <rect x="-1.5" y="-22" width="3" height="7" rx="1"/>
                  <rect x="-1.5" y="15" width="3" height="7" rx="1"/>
                </g>
                <g transform="rotate(60)">
                  <rect x="-1.5" y="-22" width="3" height="7" rx="1"/>
                  <rect x="-1.5" y="15" width="3" height="7" rx="1"/>
                </g>
                <g transform="rotate(120)">
                  <rect x="-1.5" y="-22" width="3" height="7" rx="1"/>
                  <rect x="-1.5" y="15" width="3" height="7" rx="1"/>
                </g>
                <g transform="rotate(150)">
                  <rect x="-1.5" y="-22" width="3" height="7" rx="1"/>
                  <rect x="-1.5" y="15" width="3" height="7" rx="1"/>
                </g>
                <g transform="rotate(210)">
                  <rect x="-1.5" y="-22" width="3" height="7" rx="1"/>
                  <rect x="-1.5" y="15" width="3" height="7" rx="1"/>
                </g>
                <g transform="rotate(240)">
                  <rect x="-1.5" y="-22" width="3" height="7" rx="1"/>
                  <rect x="-1.5" y="15" width="3" height="7" rx="1"/>
                </g>
                <g transform="rotate(300)">
                  <rect x="-1.5" y="-22" width="3" height="7" rx="1"/>
                  <rect x="-1.5" y="15" width="3" height="7" rx="1"/>
                </g>
              </g>
            </g>
          </svg>
        </div>
        <h1 id="uc-title">Mayan World</h1>
        <p class="uc-lead">Estamos trabajando para ofrecerte una mejor experiencia. Vuelve pronto.</p>

        <div class="uc-status">
          <span class="badge">Estado</span>
          <span>En progreso<span class="dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span></span>
        </div>

        <p class="uc-meta">Última actualización: <time id="lastUpdated" datetime=""></time></p>
      </section>
    </main>

    <script>
      // Inline JS (no external dependencies)
      (function () {
        const $time = document.getElementById('lastUpdated');
        try {
          const now = new Date();
          if ($time) {
            const opts = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            $time.textContent = now.toLocaleString('es-ES', opts);
            $time.setAttribute('datetime', now.toISOString());
          }
        } catch (e) { /* no-op */ }
        const card = document.querySelector('.uc-card');
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden && card) {
            card.animate([
              { transform: 'scale(1)', boxShadow: '0 10px 30px rgba(0,0,0,.25)' },
              { transform: 'scale(1.02)', boxShadow: '0 14px 36px rgba(0,0,0,.3)' },
              { transform: 'scale(1)', boxShadow: '0 10px 30px rgba(0,0,0,.25)' },
            ], { duration: 600, easing: 'ease-out' });
          }
        });
      })();
    </script>
  </body>
  </html>
